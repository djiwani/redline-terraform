apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    # Tells the AWS Load Balancer Controller to create an internet-facing ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # HTTPS only — redirect HTTP to HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Use the ACM certificate for HTTPS
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    # ALB sits in public subnets
    alb.ingress.kubernetes.io/subnets: {{ .Values.ingress.publicSubnets }}
    # WAF is attached at the Terraform level via CloudFront
    # API traffic goes through ALB directly so add WAF here too
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ .Values.ingress.wafAclArn }}
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /{{ .Values.ingress.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: 80
