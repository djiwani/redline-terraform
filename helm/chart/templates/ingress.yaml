apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # IngressGroup — merges all three services into one shared ALB
    # Without this each service creates its own ALB (3x cost)
    alb.ingress.kubernetes.io/group.name: redline-api
    # HTTPS only — redirect HTTP to HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Use the ACM certificate for HTTPS
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    # ALB sits in public subnets
    alb.ingress.kubernetes.io/subnets: {{ .Values.ingress.publicSubnets }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /{{ .Values.ingress.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: 80
